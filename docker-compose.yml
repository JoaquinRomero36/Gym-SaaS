version: '3.8'

services:
  backend:
    build: ./backend
    container_name: gym-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=secret
      - DATABASE_NAME=gym
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=gym-jwt-secret-change-in-prod
      - JWT_REFRESH_SECRET=gym-jwt-refresh-secret-change-in-prod
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ai-service:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: gym-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

  ai-service:
    build: ./ai-service
    container_name: gym-ai-service
    ports:
      - "8000:8000"

  postgres:
    image: postgres:15-alpine
    container_name: gym-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: gym
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gym-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data: